name: Daily Project Generator

on:
  schedule:
    - cron: '30 5 * * *'   # 11:00 AM IST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Generate today's project
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPO_PATH: .
          CI: "true"
        run: python scripts/daily_project_generator.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: daily/${{ github.run_number }}
          commit-message: "Generate daily project"
          title: "Daily project ready for review"
          body: |
            🤖 This project was automatically generated using Gemini.

            ## Checklist
            - [ ] Review the code
            - [ ] Test the project
            - [ ] Verify README
            - [ ] Merge when satisfied
          add-paths: |
            projects/
            projects.csv