name: Daily Project Generator

on:
  schedule:
    - cron: '30 5 * * *'   # 11:00 AM IST = 05:30 UTC
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab too

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate today's project
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO_PATH: .
        run: python scripts/daily_project_generator.py

      - name: Open PR for review
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: daily/${{ github.run_number }}
          commit-message: "Generate daily project"
          title: "Daily project ready for review"
          body: "Auto-generated by the scheduled workflow. Review the files, then merge to push it to main."
          add-paths: |
            projects/
            projects.csv
